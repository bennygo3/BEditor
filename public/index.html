<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Logo Editor Preview</title>
        <style>
            body {
                margin: 0;
                background: #f4f4f4;
                font-family: Arial, sans-serif;
            }

            .app-shell {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            .topbar {
                padding: 12px 16px;
                background: #111;
                color: white;
                font-size: 14px;
            }

            .workspace {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 24px;
            }

            canvas {
                background: white;
                border: 1px solid #d0d0d0;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }

            button {
                margin-right: 8px;
                padding: 6px 10px;
                border: 1px solid #444;
                background: #fff;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="app-shell">
            <div class="topbar">
                <button id="tool-select">Select Tool</button>
                <button id="rect-tool">Rect Tool</button>
                <button id="ellipse-tool">Ellipse Tool</button>
                <button id="line-tool">Line Tool</button>
                <button id="save-scene">Save Scene</button>
                <button id="load-scene">Load Scene</button>
                <button id="export-svg">Export SVG</button>
                <span style="margin-left: 15px;">Logo Editor Engine Preview</span>
            </div>
            <div class="workspace">
                <canvas id="editor-canvas" width="900" height="600"></canvas>
            </div>       
        </div>

        <script>require("../dist/app.js")</script>
         <!-- <script>
            const appPath = require.resolve("../dist/app.js");
            delete require.cache[appPath];
            require(appPath);
         </script> -->
    </body>
</html>
