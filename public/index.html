<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Logo Editor</title>
        <style>
            body {
                margin: 0;
                background: #f4f4f4;
                font-family: Arial, sans-serif;
            }

            .app-shell {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            .topbar {
                display: flex;
                justify-content: center;
                padding: 12px;
                background: #111;
                color: white;
                font-size: 14px;
                margin-bottom: 15px;
            }

            .toolbar {
                display: flex;
                justify-content: center;
                align-items: center;
                outline: thick ridge rgb(245, 239, 49);
                margin: 10px auto;
                height: 45px;
                width: 500px;
                gap: 15px;

            }

            .workspace {
                flex: 1;
                display: flex;
                justify-content: space-evenly;
                align-items: center;
                
            }

            canvas {
                background: white;
                border: 1px solid #d0d0d0;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }

            button {
                margin-right: 8px;
                padding: 6px 10px;
                border: 1px solid #444;
                background: #fff;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="app-shell">
            <header style="margin: 0 auto;">°°°Logo Editor Engine°°°</header>
            <div class="topbar">
                <button id="tool-select">Select Tool</button>
                <button id="multi-select">Multi Select</button>
                <button id="rect-tool">Rect Tool</button>
                <button id="ellipse-tool">Ellipse Tool</button>
                <button id="line-tool">Line Tool</button>
                <button id="save-scene">Save Scene</button>
                <button id="load-scene">Load Scene</button>
                <button id="export-svg">Export SVG</button>
            </div>
            <div class="toolbar">
                <label>
                    Fill:
                    <input id="fill-color" type="color" value="#4f46e5" />
                </label>
                <label>
                    Stroke:
                    <input id="stroke-color" type="color" value="#111111" />
                </label>
                <label>
                    Stroke Width:
                    <input id="stroke-width" type="number" value="2" min="0" max="20" />
                </label>
            </div>
            <div class="workspace">
                <canvas id="editor-canvas" width="900" height="700"></canvas>
            </div>       
        </div>

        <script>require("../dist/app.js")</script>
         <!-- <script>
            const appPath = require.resolve("../dist/app.js");
            delete require.cache[appPath];
            require(appPath);
         </script> -->
    </body>
</html>
